<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Próximos Eventos – PIB Rio Verde</title>
  <link rel="icon" type="image/png" href="assets/logo2.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    @keyframes gradientShift {
      0%   { opacity: 1; }
      50%  { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    *{ box-sizing:border-box }
    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:#eef2ff;
      min-height:100vh;
      background:#0d0050;
      position:relative;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:28px 16px 48px;
    }
    body::before, body::after { content:''; position:fixed; inset:0; z-index:-1; }
    body::before { background: linear-gradient(135deg, #05001f, #1a1a6e, #05001f); }
    body::after  { background: linear-gradient(135deg, #1a1a6e, #05001f, #1a1a6e); animation: gradientShift 6s ease-in-out infinite; }

    .wrap{ width:100%; max-width:600px; }

    .back{
      display:inline-flex; align-items:center; gap:6px;
      color:rgba(238,242,255,.72); font-size:13px; font-weight:600;
      text-decoration:none; margin-bottom:18px; transition:color .15s;
    }
    .back:hover{ color:#eef2ff; }
    .back svg{ width:16px; height:16px; }

    .card{
      background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.10);
      border-radius:18px; box-shadow:0 18px 60px rgba(0,0,0,.45);
      padding:28px 24px; backdrop-filter:blur(12px);
    }

    .page-title{ font-size:22px; font-weight:700; margin:0 0 4px; }
    .page-subtitle{ color:rgba(238,242,255,.72); font-size:14px; margin:0 0 24px; }

    .events-list{ display:flex; flex-direction:column; gap:14px; }

    .event-card{
      background:linear-gradient(135deg, rgba(99,102,241,.10), rgba(236,72,153,.10));
      border:1px solid rgba(236,72,153,.22);
      border-radius:14px; padding:16px;
      display:flex; gap:16px; align-items:flex-start;
      animation: fadeIn .35s ease both;
    }

    .event-date{
      flex:0 0 auto;
      background:linear-gradient(135deg, #6366f1, #ec4899);
      border-radius:10px; padding:8px 12px;
      text-align:center; min-width:52px;
    }
    .event-date .day{ font-size:22px; font-weight:700; line-height:1; color:#fff; }
    .event-date .month{ font-size:10px; font-weight:700; color:rgba(255,255,255,.8); text-transform:uppercase; letter-spacing:1px; }

    .event-info{ flex:1; }
    .event-title{ font-size:15px; font-weight:700; margin:0 0 4px; }
    .event-detail{ font-size:13px; color:rgba(238,242,255,.65); line-height:1.5; }

    .event-link{
      display:inline-flex; align-items:center; gap:6px;
      margin-top:10px; font-size:12px; font-weight:600;
      color:#a5b4fc; text-decoration:none; transition:color .15s;
    }
    .event-link:hover{ color:#c4b5fd; }
    .event-link svg{ width:14px; height:14px; }

    .no-events{
      text-align:center; padding:40px 20px;
      color:rgba(238,242,255,.4); font-size:14px;
    }
    .no-events svg{ width:40px; height:40px; opacity:.3; display:block; margin:0 auto 12px; }

    .loading{
      text-align:center; padding:40px 20px;
      color:rgba(238,242,255,.5); font-size:14px;
      display:flex; flex-direction:column; align-items:center; gap:12px;
    }
    .spinner{
      width:28px; height:28px;
      border:3px solid rgba(255,255,255,.15);
      border-top-color:#6366f1;
      border-radius:50%;
      animation:spin .8s linear infinite;
    }

    .source-badge{
      display:inline-flex; align-items:center; gap:5px;
      font-size:11px; color:rgba(238,242,255,.35);
      margin-top:18px; padding:0 4px;
    }
    .source-badge svg{ width:12px; height:12px; }

    footer{
      margin-top:24px; text-align:center;
      color:rgba(238,242,255,.45); font-size:12px;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <a class="back" href="index.html">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.8 18.4a1 1 0 0 0 0-1.4L6.7 13H19a1 1 0 1 0 0-2H6.7l4.1-4.1a1 1 0 1 0-1.4-1.4L3.6 11.3a1 1 0 0 0 0 1.4l5.8 5.7a1 1 0 0 0 1.4 0z"/></svg>
      Voltar
    </a>

    <div class="card">
      <h1 class="page-title">Próximos Eventos</h1>
      <p class="page-subtitle">Confira o que está por vir na PIB Rio Verde.</p>

      <div class="events-list" id="events-list">
        <div class="loading" id="loading">
          <div class="spinner"></div>
          Carregando eventos...
        </div>
      </div>

      <div class="source-badge" id="source-badge" style="display:none">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>
        Eventos gerenciados via Google Planilhas
      </div>
    </div>

    <footer>© <span id="year"></span> PIB Rio Verde</footer>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    // URL pública da planilha (CSV) — não alterar
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTSMTVf2VtsoB3ePFs-WuT4DO20KVaz0X4VYXiz5vagHvcp9lFr791fla12Kw1KFTXVE5asWaEX5ipW/pub?output=csv";

    // Evento de exemplo (aparece enquanto a planilha estiver vazia)
    const FALLBACK_EVENTS = [
      {
        dia: "22",
        mes: "Jun",
        titulo: "Culto de Aniversário da Igreja",
        detalhes: "Domingo, 22 de Junho · 19h00\nTemplo Central – Av. Pres. Vargas, 399",
        link: "",
        linkTexto: ""
      }
    ];

    // Parser de CSV (lida com vírgulas dentro de aspas)
    function parseCSV(text) {
      const rows = [];
      const lines = text.replace(/\r/g, "").split("\n");
      for (const line of lines) {
        if (!line.trim()) continue;
        const cols = [];
        let current = "";
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            if (inQuotes && line[i + 1] === '"') { current += '"'; i++; }
            else inQuotes = !inQuotes;
          } else if (ch === "," && !inQuotes) {
            cols.push(current); current = "";
          } else {
            current += ch;
          }
        }
        cols.push(current);
        rows.push(cols);
      }
      return rows;
    }

    function renderEvents(events) {
      const list = document.getElementById("events-list");
      list.innerHTML = "";

      if (!events || events.length === 0) {
        list.innerHTML = `
          <div class="no-events">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
            Nenhum evento programado no momento.<br>Fique de olho!
          </div>`;
        return;
      }

      events.forEach((ev, i) => {
        const card = document.createElement("div");
        card.className = "event-card";
        card.style.animationDelay = (i * 60) + "ms";

        const detailLines = (ev.detalhes || "").replace(/\\n/g, "<br>").replace(/\n/g, "<br>");

        const linkHtml = ev.link
          ? `<a class="event-link" href="${ev.link}" target="_blank" rel="noopener">
               ${ev.linkTexto || "Saiba mais"}
               <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.2 5.6a1 1 0 0 0 0 1.4l4.1 4.1H5a1 1 0 1 0 0 2h12.3l-4.1 4.1a1 1 0 1 0 1.4 1.4l5.8-5.8a1 1 0 0 0 0-1.4l-5.8-5.8a1 1 0 0 0-1.4 0z"/></svg>
             </a>`
          : "";

        card.innerHTML = `
          <div class="event-date">
            <div class="day">${ev.dia}</div>
            <div class="month">${ev.mes}</div>
          </div>
          <div class="event-info">
            <div class="event-title">${ev.titulo}</div>
            <div class="event-detail">${detailLines}</div>
            ${linkHtml}
          </div>`;

        list.appendChild(card);
      });
    }

    async function loadFromSheets() {
      try {
        const res = await fetch(CSV_URL);
        const text = await res.text();
        const rows = parseCSV(text);

        const events = rows
          .map(cols => ({
            dia:       (cols[0] || "").trim(),
            mes:       (cols[1] || "").trim(),
            titulo:    (cols[2] || "").trim(),
            detalhes:  (cols[3] || "").trim(),
            link:      (cols[4] || "").trim(),
            linkTexto: (cols[5] || "").trim()
          }))
          // Só inclui linhas onde "Dia" é número (filtra cabeçalhos e linhas vazias)
          .filter(e => e.titulo && /^\d+$/.test(e.dia));

        renderEvents(events.length ? events : FALLBACK_EVENTS);
        if (events.length) {
          document.getElementById("source-badge").style.display = "inline-flex";
        }
      } catch (e) {
        console.warn("Erro ao carregar planilha:", e);
        renderEvents(FALLBACK_EVENTS);
      }
    }

    loadFromSheets();
  </script>
</body>
</html>
