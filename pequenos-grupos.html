<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pequenos Grupos – PIB Rio Verde</title>
  <link rel="icon" type="image/png" href="assets/logo2.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --card:rgba(255,255,255,.06);
      --stroke:rgba(255,255,255,.10);
      --text:#eef2ff;
      --muted:rgba(238,242,255,.72);
      --btn:rgba(255,255,255,.08);
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --radius:18px;
      --max:560px;
    }

    @keyframes gradientShift {
      0%   { opacity: 1; }
      50%  { opacity: 0; }
      100% { opacity: 1; }
    }

    *{ box-sizing:border-box }
    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      min-height:100vh;
      background:#0d0050;
      position:relative;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:28px 16px 48px;
    }
    body::before, body::after { content:''; position:fixed; inset:0; z-index:-1; }
    body::before { background: linear-gradient(135deg, #05001f, #1a1a6e, #05001f); }
    body::after  { background: linear-gradient(135deg, #1a1a6e, #05001f, #1a1a6e); animation: gradientShift 6s ease-in-out infinite; }

    .wrap{ width:100%; max-width:var(--max); }

    .back{
      display:inline-flex; align-items:center; gap:6px;
      color:var(--muted); font-size:13px; font-weight:600;
      text-decoration:none; margin-bottom:18px; transition:color .15s;
    }
    .back:hover{ color:var(--text); }
    .back svg{ width:16px; height:16px; }

    .card{
      background:var(--card); border:1px solid var(--stroke);
      border-radius:var(--radius); box-shadow:var(--shadow);
      padding:28px 24px; backdrop-filter:blur(12px);
    }

    .page-title{ font-size:22px; font-weight:700; margin:0 0 4px; }
    .page-subtitle{ color:var(--muted); font-size:14px; margin:0 0 28px; line-height:1.5; }

    .section-title{
      font-size:11px; font-weight:700; color:var(--muted);
      text-transform:uppercase; letter-spacing:1.5px;
      margin-bottom:14px; padding-left:4px;
    }

    .form-group{ margin-bottom:16px; }
    label.field-label{
      display:block; font-size:13px; font-weight:600;
      margin-bottom:6px; color:var(--muted);
    }
    input[type="text"], input[type="tel"]{
      width:100%; padding:12px 14px; border-radius:12px;
      background:var(--btn); border:1px solid var(--stroke);
      color:var(--text); font-size:14px; font-family:inherit;
      outline:none; transition:border-color .15s;
    }
    input[type="text"]::placeholder, input[type="tel"]::placeholder{ color:rgba(238,242,255,.35); }
    input[type="text"]:focus, input[type="tel"]:focus{ border-color:rgba(99,102,241,.6); }

    .checkbox-group{ display:flex; flex-direction:column; gap:10px; }
    .checkbox-item{
      display:flex; align-items:center; gap:12px;
      padding:12px 14px; border-radius:12px;
      background:var(--btn); border:1px solid var(--stroke);
      cursor:pointer; transition:background .12s;
    }
    .checkbox-item:hover{ background:rgba(255,255,255,.12); }
    .checkbox-item input[type="checkbox"]{ width:18px; height:18px; accent-color:#6366f1; cursor:pointer; flex:0 0 auto; }
    .checkbox-item span{ font-size:14px; font-weight:600; }

    .submit-btn{
      display:flex; align-items:center; justify-content:center; gap:10px;
      width:100%; margin-top:24px; padding:15px;
      border-radius:14px; border:none; cursor:pointer;
      background:linear-gradient(135deg, #6366f1, #8b5cf6);
      color:#fff; font-size:15px; font-weight:700; font-family:inherit;
      transition:opacity .15s, transform .12s;
    }
    .submit-btn:hover{ opacity:.9; transform:translateY(-1px); }
    .submit-btn:active{ transform:translateY(0); }
    .submit-btn svg{ width:20px; height:20px; }

    footer{
      margin-top:24px; text-align:center;
      color:rgba(238,242,255,.45); font-size:12px;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <a class="back" href="index.html">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.8 18.4a1 1 0 0 0 0-1.4L6.7 13H19a1 1 0 1 0 0-2H6.7l4.1-4.1a1 1 0 1 0-1.4-1.4L3.6 11.3a1 1 0 0 0 0 1.4l5.8 5.7a1 1 0 0 0 1.4 0z"/></svg>
      Voltar
    </a>

    <div class="card">
      <h1 class="page-title">Encontre um Pequeno Grupo</h1>
      <p class="page-subtitle">Os Pequenos Grupos são espaços de comunhão, estudo da Palavra e cuidado mútuo. Preencha o formulário e entraremos em contato com você!</p>

      <div class="form-group">
        <label class="field-label" for="nome">Nome completo</label>
        <input type="text" id="nome" placeholder="Seu nome" />
      </div>

      <div class="form-group">
        <label class="field-label" for="telefone">Telefone / WhatsApp</label>
        <input type="tel" id="telefone" placeholder="(64) 9 0000-0000" />
      </div>

      <div class="form-group" style="margin-top:20px;">
        <div class="section-title">Qual grupo te interessa?</div>
        <div class="checkbox-group">
          <label class="checkbox-item">
            <input type="checkbox" value="PGM de rapazes" />
            <span>PGM de Rapazes</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" value="PGM de moças" />
            <span>PGM de Moças</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" value="PGM de casais" />
            <span>PGM de Casais</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" value="PGM de homens adultos" />
            <span>PGM de Homens (adultos)</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" value="PGM de mulheres adultas" />
            <span>PGM de Mulheres (adultas)</span>
          </label>
        </div>
      </div>

      <button class="submit-btn" onclick="enviarWhatsApp()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.4 3.6A11.93 11.93 0 0 0 12 0C5.4 0 0 5.4 0 12c0 2.1.6 4.2 1.6 6L0 24l6.2-1.6A12 12 0 0 0 12 24c6.6 0 12-5.4 12-12 0-3.2-1.2-6.2-3.6-8.4zM12 22c-1.8 0-3.6-.5-5.1-1.4l-.4-.2-3.7.9.9-3.7-.2-.4A9.94 9.94 0 0 1 2 12C2 6.5 6.5 2 12 2c2.7 0 5.2 1 7.1 2.9A9.92 9.92 0 0 1 22 12c0 5.5-4.5 10-10 10zm5.5-7.5c-.3-.1-1.8-.9-2.1-1-.3-.1-.5-.1-.7.1-.2.3-.8 1-.9 1.2-.2.2-.3.2-.6.1-1.8-.9-3-1.6-4.2-3.6-.3-.5.3-.5.9-1.6.1-.2 0-.4-.1-.5-.1-.1-.7-1.7-1-2.3-.3-.6-.5-.5-.7-.5H6.5c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4s1 2.8 1.2 3c.1.2 2 3 4.8 4.2.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.5-.1 1.8-.7 2-1.4.2-.7.2-1.3.1-1.4-.1-.1-.3-.2-.6-.3z"/></svg>
        Enviar pelo WhatsApp
      </button>
    </div>

    <footer>© <span id="year"></span> PIB Rio Verde</footer>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    function enviarWhatsApp() {
      const nome = document.getElementById("nome").value.trim();
      const telefone = document.getElementById("telefone").value.trim();
      const checkboxes = document.querySelectorAll(".checkbox-group input[type='checkbox']:checked");
      const grupos = Array.from(checkboxes).map(c => c.value);

      if (!nome) { alert("Por favor, informe seu nome."); return; }
      if (!telefone) { alert("Por favor, informe seu telefone."); return; }
      if (grupos.length === 0) { alert("Selecione pelo menos um grupo de interesse."); return; }

      const gruposTexto = grupos.join(", ");
      const mensagem = `Olá! Vim pelo site e gostaria de encontrar um Pequeno Grupo.\n\n*Nome:* ${nome}\n*Telefone:* ${telefone}\n*Grupos de interesse:* ${gruposTexto}`;
      const url = `https://wa.me/556499344612?text=${encodeURIComponent(mensagem)}`;
      window.open(url, "_blank");
    }
  </script>
</body>
</html>
