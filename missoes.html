<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Missões – PIB Rio Verde</title>
  <link rel="icon" type="image/png" href="assets/logo2.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    @keyframes gradientShift {
      0%   { opacity: 1; }
      50%  { opacity: 0; }
      100% { opacity: 1; }
    }

    *{ box-sizing:border-box }
    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:#eef2ff;
      min-height:100vh;
      background:#0d0050;
      position:relative;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:28px 16px 48px;
    }
    body::before, body::after { content:''; position:fixed; inset:0; z-index:-1; }
    body::before { background: linear-gradient(135deg, #05001f, #1a1a6e, #05001f); }
    body::after  { background: linear-gradient(135deg, #1a1a6e, #05001f, #1a1a6e); animation: gradientShift 6s ease-in-out infinite; }

    .wrap{ width:100%; max-width:900px; }

    .back{
      display:inline-flex; align-items:center; gap:6px;
      color:rgba(238,242,255,.72); font-size:13px; font-weight:600;
      text-decoration:none; margin-bottom:18px; transition:color .15s;
    }
    .back:hover{ color:#eef2ff; }
    .back svg{ width:16px; height:16px; }

    .card{
      background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.10);
      border-radius:18px; box-shadow:0 18px 60px rgba(0,0,0,.45);
      padding:28px 24px; backdrop-filter:blur(12px);
    }

    .page-title{ font-size:22px; font-weight:700; margin:0 0 4px; }
    .page-subtitle{ color:rgba(238,242,255,.72); font-size:14px; margin:0 0 24px; }

    .infographic-container{
      width:100%;
      border-radius:12px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
    }
    .infographic-container img{
      width:100%;
      height:auto;
      display:block;
    }

    /* Placeholder para quando a imagem não estiver disponível */
    .img-placeholder{
      width:100%; padding:60px 20px;
      background:rgba(255,255,255,.04);
      border-radius:12px; border:2px dashed rgba(255,255,255,.15);
      text-align:center; color:rgba(238,242,255,.45);
      font-size:14px; line-height:1.6;
    }
    .img-placeholder svg{ width:48px; height:48px; opacity:.3; margin-bottom:12px; display:block; margin-inline:auto; }

    footer{
      margin-top:24px; text-align:center;
      color:rgba(238,242,255,.45); font-size:12px;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <a class="back" href="index.html">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.8 18.4a1 1 0 0 0 0-1.4L6.7 13H19a1 1 0 1 0 0-2H6.7l4.1-4.1a1 1 0 1 0-1.4-1.4L3.6 11.3a1 1 0 0 0 0 1.4l5.8 5.7a1 1 0 0 0 1.4 0z"/></svg>
      Voltar
    </a>

    <div class="card">
      <h1 class="page-title">Missões PIB Rio Verde</h1>
      <p class="page-subtitle">Como são belos nos montes os pés daqueles que anunciam boas-novas... do outro lado da rua, do outro lado do mundo.</p>

      <div class="infographic-container">
        <!--
          Salve o infográfico de missões como: assets/missoes.png
          e ele aparecerá automaticamente aqui.
        -->
        <img
          src="assets/missoes.png"
          alt="Infográfico de Missões PIB Rio Verde"
          onerror="this.style.display='none'; document.getElementById('placeholder').style.display='block';"
        />
      </div>

      <div id="placeholder" class="img-placeholder" style="display:none;">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
        Para exibir o infográfico, salve a imagem como <strong>assets/missoes.png</strong> na pasta do projeto.
      </div>
    </div>

    <footer>© <span id="year"></span> PIB Rio Verde</footer>
  </main>

  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
